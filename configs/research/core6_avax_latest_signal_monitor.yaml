task:
  name: core6_avax_latest_signal_monitor

paths:
  runs_dir: reports/runs
  output_report_path: reports/research/core6_avax_latest_signal_monitor/latest.json
  output_markdown_path: reports/research/core6_avax_latest_signal_monitor/latest.md

experiment:
  base_config_path: configs/live_prod.yaml
  env_path: .env
  cache_dir: data/cache
  ohlcv_limit: 720
  initial_equity_usdt: 100.0
  top_scores_limit: 5
  baseline_name: core6_cost018
  champion_name: avax_015
  variants:
    - name: core6_cost018
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
      overrides:
        execution.cost_aware_min_score_floor: 0.18
        execution.cost_aware_score_per_bps: 0.00325
    - name: avax_015
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - AVAX/USDT
      overrides:
        execution.cost_aware_min_score_floor: 0.15
        execution.cost_aware_score_per_bps: 0.00325
