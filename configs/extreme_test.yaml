# 极端测试配置 - 强制产生交易
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT

timeframe_main: 1h
timeframe_aux: 4h

exchange:
  name: okx
  testnet: false

alpha:
  long_top_pct: 0.50  # 选择前50%
  weights:
    f1_mom_5d: 0.40   # 增加短期动量
    f2_mom_20d: 0.30   # 保持F2权重
    f3_vol_adj_ret_20d: 0.15
    f4_volume_expansion: 0.10
    f5_rsi_trend_confirm: 0.05

regime:
  atr_threshold: 0.01   # 极低阈值
  atr_very_low: 0.005
  pos_mult_trending: 1.5
  pos_mult_sideways: 1.0  # 横盘也交易
  pos_mult_risk_off: 1.0  # 风险规避也交易

risk:
  max_single_weight: 0.50  # 允许重仓
  max_gross_exposure: 1.0   # 不允许杠杆
  drawdown_trigger: 0.20   # 宽松回撤
  drawdown_delever: 0.50

rebalance:
  interval_minutes: 30     # 更频繁调仓
  deadband_sideways: 0.01  # 极低deadband
  deadband_trending: 0.005
  deadband_riskoff: 0.01

execution:
  mode: dry_run
  dry_run: true
  fee_bps: 6
  slippage_bps: 5

backtest:
  start_date: "2026-01-19"
  end_date: "2026-02-17"
  fee_bps: 6
  slippage_bps: 5
  one_bar_delay: true
  walk_forward_folds: 2    # 减少folds加快测试
  cost_model: fixed        # 使用固定成本避免限制
  cost_stats_dir: ""
  fee_quantile: p75
  slippage_quantile: p90
  min_fills_global: 1      # 极低要求
  min_fills_bucket: 1
  max_stats_age_days: 365  # 不限制数据年龄