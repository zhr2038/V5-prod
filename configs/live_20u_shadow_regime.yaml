# Shadow mode (dry-run) for regime-aware alpha weights.
# This config is for evaluation only and MUST NOT place live orders.

symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT

universe:
  enabled: true
  use_universe_symbols: true
  cache_path: reports/universe_cache_shadow.json
  cache_ttl_sec: 0
  top_n_market_cap: 50
  min_24h_quote_volume_usdt: 10000000
  max_spread_bps: 20
  refine_with_single_ticker: false
  blacklist_path: configs/blacklist.json
  exclude_stablecoins: true
  include_symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT

alpha:
  long_top_pct: 0.25
  dynamic_weights_by_regime_enabled: true
  dynamic_weights_by_regime_path: reports/alpha_dynamic_weights_by_regime.json

execution:
  mode: dry_run
  dry_run: true
  order_store_path: reports/shadow_orders.sqlite

budget:
  live_equity_cap_usdt: 20.0
  exchange_min_notional_enabled: true
  exchange_min_notional_slack_multiplier: 1.05
