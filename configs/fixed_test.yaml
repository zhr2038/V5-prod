# 修复后测试配置
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT

timeframe_main: 1h
timeframe_aux: 4h

exchange:
  name: okx
  testnet: false

alpha:
  long_top_pct: 0.30  # 选择前30%
  weights:
    f1_mom_5d: 0.30   # 5日动量
    f2_mom_20d: 0.20  # 20日动量(优化后权重)
    f3_vol_adj_ret_20d: 0.20
    f4_volume_expansion: 0.15
    f5_rsi_trend_confirm: 0.15

regime:
  atr_threshold: 0.01      # 修复后的阈值(1%)
  atr_very_low: 0.004
  pos_mult_trending: 1.2
  pos_mult_sideways: 0.7   # 提高横盘仓位
  pos_mult_risk_off: 0.7   # 提高Risk-Off仓位

risk:
  max_single_weight: 0.25
  max_gross_exposure: 1.0
  drawdown_trigger: 0.08
  drawdown_delever: 0.50

rebalance:
  interval_minutes: 60
  deadband_sideways: 0.03  # 降低deadband(3%)
  deadband_trending: 0.02
  deadband_riskoff: 0.04

execution:
  mode: dry_run
  dry_run: true
  fee_bps: 6
  slippage_bps: 5

backtest:
  start_date: "2026-01-19"
  end_date: "2026-02-17"
  fee_bps: 6
  slippage_bps: 5
  one_bar_delay: true
  walk_forward_folds: 4
  cost_model: calibrated    # 使用校准成本模型
  cost_stats_dir: reports/cost_stats_clean
  fee_quantile: p75
  slippage_quantile: p90
  min_fills_global: 10
  min_fills_bucket: 5
  max_stats_age_days: 30