# V5完整回测配置 - 优化后策略验证
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT
  - ADA/USDT
  - DOGE/USDT
  - XRP/USDT
  - DOT/USDT
  - LINK/USDT
  - AVAX/USDT

timeframe_main: 1h
timeframe_aux: 4h

exchange:
  name: okx
  testnet: false
  api_key: ${EXCHANGE_API_KEY}
  api_secret: ${EXCHANGE_API_SECRET}
  passphrase: ${EXCHANGE_API_PASSPHRASE}

universe:
  enabled: false  # 回测时禁用动态universe

alpha:
  long_top_pct: 0.20
  weights:
    f1_mom_5d: 0.28      # 优化后权重
    f2_mom_20d: 0.20      # ✅ 优化后：基于IC+成本分析
    f3_vol_adj_ret_20d: 0.24  # 优化后权重
    f4_volume_expansion: 0.14  # 优化后权重
    f5_rsi_trend_confirm: 0.14  # 优化后权重

regime:
  atr_threshold: 0.02
  atr_very_low: 0.008
  pos_mult_trending: 1.0
  pos_mult_sideways: 0.7
  pos_mult_risk_off: 0.4

risk:
  max_single_weight: 0.20
  max_gross_exposure: 0.8
  drawdown_trigger: 0.06
  drawdown_delever: 0.50

rebalance:
  interval_minutes: 60
  deadband_sideways: 0.05
  deadband_trending: 0.03
  deadband_riskoff: 0.05

execution:
  mode: backtest
  dry_run: false
  fee_bps: 6
  slippage_bps: 5

backtest:
  start_date: "2026-01-01"  # 1.5个月数据
  end_date: "2026-02-17"    # 昨天
  fee_bps: 6
  slippage_bps: 5
  one_bar_delay: true
  walk_forward_folds: 4
  cost_model: calibrated     # ✅ 使用校准模型
  cost_stats_dir: reports/cost_stats_clean  # ✅ 使用清洗后数据
  fee_quantile: p75
  slippage_quantile: p90
  min_fills_global: 10
  min_fills_bucket: 5
  max_stats_age_days: 30
  
  # 回测特定设置
  initial_equity_usdt: 10000.0  # 初始资金$10,000
  enable_volume_constraints: true
  max_hourly_volume_pct: 0.02
  enable_slippage_model: true
  
  # 输出设置
  output_dir: reports/full_backtest_results
  save_trade_log: true
  save_equity_curve: true
  save_position_history: true

# 回测验证组
validation:
  compare_groups:
    - name: "优化前_F2_25%_固定成本"
      alpha_weights:
        f1_mom_5d: 0.30
        f2_mom_20d: 0.25
        f3_vol_adj_ret_20d: 0.25
        f4_volume_expansion: 0.10
        f5_rsi_trend_confirm: 0.10
      cost_model: fixed
      
    - name: "优化后_F2_20%_校准成本"
      alpha_weights:
        f1_mom_5d: 0.28
        f2_mom_20d: 0.20
        f3_vol_adj_ret_20d: 0.24
        f4_volume_expansion: 0.14
        f5_rsi_trend_confirm: 0.14
      cost_model: calibrated
      
    - name: "激进_F2_15%_校准成本"
      alpha_weights:
        f1_mom_5d: 0.29
        f2_mom_20d: 0.15
        f3_vol_adj_ret_20d: 0.26
        f4_volume_expansion: 0.15
        f5_rsi_trend_confirm: 0.15
      cost_model: calibrated

# 性能指标阈值
performance_thresholds:
  min_sharpe: 0.5
  min_cagr_pct: 5.0
  max_drawdown_pct: 20.0
  min_win_rate: 40.0
  min_profit_factor: 1.2
  max_cost_ratio: 0.3  # 成本占收益比例不超过30%