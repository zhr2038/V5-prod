# 20 USDT 实盘小资金测试配置
# 优化版：启用 universe 动态选股 + auto_blacklist + 动态权重

# symbols 作为保底，universe 会在此基础上扩展
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT

timeframe_main: 1h
timeframe_aux: 4h

exchange:
  name: okx
  api_key: ${EXCHANGE_API_KEY}
  api_secret: ${EXCHANGE_API_SECRET}
  passphrase: ${EXCHANGE_PASSPHRASE}
  testnet: false

universe:
  enabled: true
  use_universe_symbols: true
  cache_path: reports/universe_cache.json
  cache_ttl_sec: 3600

  # 动态选股参数（历史优化配置）
  top_n_market_cap: 30              # 选市值前30
  min_24h_quote_volume_usdt: 10000000  # 24h成交额 > 1000万 USDT
  max_spread_bps: 20                 # 点差 < 20bps
  
  # 点差过大的币自动拉黑7天
  blacklist_path: configs/blacklist.json
  exclude_stablecoins: true
  
  # 单币 ticker 精筛（更可靠的成交量数据）
  refine_with_single_ticker: true
  refine_single_ticker_max_candidates: 100
  refine_single_ticker_sleep_sec: 0.02
  
  # 保底币种（确保这些主流币始终在池子里）
  include_symbols:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - ADA/USDT
    - DOT/USDT
    - AVAX/USDT
    - POL/USDT
    - ATOM/USDT
    - NEAR/USDT
    - LINK/USDT
    - UNI/USDT
    - AAVE/USDT
    - LTC/USDT
    - BCH/USDT
    - ETC/USDT
    - XRP/USDT
    - DOGE/USDT
    - TRX/USDT
    - SUI/USDT

alpha:
  long_top_pct: 0.25  # 选择评分前25%的币
  
  # 基于 IC 分析的静态权重（IC(1h)=0.5549）
  weights:
    f1_mom_5d: 0.20      # IC=0.1788
    f2_mom_20d: 0.30     # IC=0.2599（最佳因子）
    f3_vol_adj_ret_20d: 0.25  # IC=0.1243
    f4_volume_expansion: 0.15  # IC=0.1376
    f5_rsi_trend_confirm: 0.10  # IC=0.0505
  
  # 动态权重配置（按市场状态调整）
  dynamic_weights_by_regime_enabled: true
  dynamic_weights_by_regime_path: reports/alpha_dynamic_weights_by_regime.json

regime:
  atr_threshold: 0.02
  atr_very_low: 0.008
  pos_mult_trending: 1.2
  pos_mult_sideways: 0.6
  pos_mult_risk_off: 0.0  # Risk-Off 默认只减仓；是否放松由情绪驱动override决定
  sentiment_regime_override_enabled: true
  sentiment_riskoff_relax_threshold: 0.65   # 情绪>=0.65 时可放松Risk-Off
  sentiment_riskoff_harden_threshold: -0.65 # 情绪<=-0.65 时强化Risk-Off
  ma_gap_relax_threshold: 0.03              # MA缺口<=3%才允许放松

risk:
  max_single_weight: 0.30  # 提高单币种限制，避免资金不足
  max_gross_exposure: 1.0
  drawdown_trigger: 0.10  # 提高回撤触发
  drawdown_delever: 0.60  # 减少 delever

rebalance:
  deadband_sideways: 0.07
  deadband_trending: 0.03
  deadband_riskoff: 0.07

  # Small-budget tuning: do NOT double deadband for new positions; otherwise signals rarely cross.
  new_position_deadband_multiplier: 1.0
  new_position_weight_eps: 0.001

  # If a coin drops out of selected (tw=0), allow faster cleanup than normal rebalance.
  close_only_deadband_multiplier: 0.25
  close_only_weight_eps: 0.001

execution:
  mode: live
  dry_run: false  # ⚠️ 关键：启用真实交易！
  order_store_path: reports/orders.sqlite
  kill_switch_path: reports/kill_switch.json
  reconcile_status_path: reports/reconcile_status.json
  okx_exp_time_ms: 1500
  live_arm_env: V5_LIVE_ARM
  live_arm_value: "YES"
  
  # 🔧 借币预防机制（基于 PEPE 问题经验）
  borrow_prevention: true
  min_trade_value_usdt: 5.0  # 最小交易金额
  max_fee_ratio: 0.05  # 最大手续费比例
  check_fee_currency_balance: true  # 检查手续费币种余额
  high_risk_blacklist_path: configs/borrow_prevention_rules.json

  # live preflight
  preflight_enabled: true
  preflight_max_pages: 5
  max_status_age_sec: 180
  preflight_fail_action: sell_only

  # Ops: allow kill-switch to auto-clear when reconcile+ledger OK (prevents stuck automation)
  auto_clear_kill_switch_if_ok: true

  # state-alignment patch when reconcile shows base/usdt mismatch
  preflight_bootstrap_patch_enabled: true
  preflight_bootstrap_patch_min_interval_sec: 300
  preflight_bootstrap_patch_max_total_usdt: 50.0

  split_orders: 3
  split_interval_sec: 3
  max_hourly_volume_pct: 0.05
  slippage_db_path: reports/slippage.sqlite
  fee_bps: 6
  slippage_bps: 5

budget:
  # 实盘测试 - 设置明确的资金限制
  live_equity_cap_usdt: 20.0  # ✅ 限制为 20 USDT（安全测试规模）

  # Exchange min-order protection (avoid 51020/minSz failures on small budget)
  exchange_min_notional_enabled: true
  exchange_min_notional_slack_multiplier: 1.05

  # Let exchange minSz-based filter be the primary guard; avoid blocking valid small-budget opens.
  min_trade_notional_base: 0.0
  min_trade_notional_multiplier_exceeded: 1.5  # 启用超支惩罚
  min_trade_notional_cap_abs: 100.0
  min_trade_notional_cap_equity_ratio: 0.03  # 合理上限
  small_trade_median_threshold_abs: 10.0  # 合理阈值
  small_trade_median_threshold_equity_ratio: 0.002  # 合理比例
  small_trade_ratio_threshold: 0.5  # 合理小交易比例阈值
  min_fills_for_second_stage: 3  # 合理要求
  deadband_multiplier_exceeded: 1.5  # 启用超支惩罚
  deadband_cap: 0.15  # 合理上限
  action_enabled: true  # ✅ 启用 budget 限制（安全运行）
  turnover_budget_per_day: null
  cost_budget_bps_per_day: null

backtest:
  fee_bps: 6
  slippage_bps: 5
  one_bar_delay: true
  walk_forward_folds: 4
  # 成本校准（F2）
  cost_model: calibrated  # default|calibrated
  cost_stats_dir: reports/cost_stats
  fee_quantile: p75
  slippage_quantile: p90
  # 小样本阶段先把门槛降下来，尽快让 calibrated 成本模型生效
  min_fills_global: 2
  min_fills_bucket: 1
  max_stats_age_days: 7

# ============================================================
# Alpha 引擎配置
# ============================================================
alpha:
  # 启用多策略模式 (趋势跟踪60% + 均值回归40%)
  use_multi_strategy: true
  
  # 原有6因子配置（多策略模式下不使用，保留备用）
  weights:
    f1_mom_5d: 0.12
    f2_mom_20d: 0.20
    f3_vol_adj_ret_20d: 0.12
    f4_volume_expansion: 0.13
    f5_rsi_trend_confirm: 0.13
  long_top_pct: 0.20
  dynamic_weights_by_regime_enabled: false

# ============================================================
# 因子权重配置 (IC-based动态权重)
# ============================================================
factor_weights:
  scheme: hierarchical  # conservative | dynamic | hierarchical
  
  # 基础技术因子 (70%)
  base:
    f1_mom_5d: 0.12           # 短期动量 12%
    f2_mom_20d: 0.20          # 中期动量 20% (核心)
    f3_vol_adj_ret_20d: 0.12  # 波动率调整 12%
    f4_volume_expansion: 0.13 # 成交量 13%
    f5_rsi_trend_confirm: 0.13# RSI趋势 13%
  
  # 情绪因子 (15%基础 + 动态调整)
  sentiment:
    f6_sentiment: 0.15
    enabled: true
    max_weight: 0.30
    min_weight: 0.05
  
  # 情绪反向操作策略
  sentiment_contrarian:
    enabled: true
    greedy_threshold: 0.70      # 极度贪婪阈值
    fearful_threshold: -0.70    # 极度恐惧阈值
    position_adjustment: 0.30   # 仓位调整幅度
    
    # 具体操作
    actions:
      extreme_greed:
        factor_boost: -0.10     # 降低情绪权重
        position_scale: 0.70    # 减仓30%
        reason: "FOMO预警:市场过热"
      extreme_fear:
        factor_boost: +0.10     # 提高情绪权重
        position_scale: 1.20    # 加仓20%
        reason: "恐慌抄底:市场超跌"

# 数据源配置 (情绪分析)
sentiment:
  enabled: true
  provider: deepseek          # deepseek | openai | textblob
  update_interval: 3600       # 每小时更新 (秒)
  cache_dir: data/sentiment_cache
  symbols:
    - BTC-USDT
    - ETH-USDT
    - SOL-USDT
    - BNB-USDT
    - ADA-USDT
    - DOT-USDT
    - AVAX-USDT
    - POL/USDT