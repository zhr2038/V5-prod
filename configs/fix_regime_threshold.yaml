# 修复配置 - 调整Regime阈值
symbols:
  - BTC/USDT
  - ETH/USDT
  - SOL/USDT
  - BNB/USDT

timeframe_main: 1h
timeframe_aux: 4h

exchange:
  name: okx
  testnet: false

alpha:
  long_top_pct: 0.20
  weights:
    f1_mom_5d: 0.28
    f2_mom_20d: 0.20
    f3_vol_adj_ret_20d: 0.24
    f4_volume_expansion: 0.14
    f5_rsi_trend_confirm: 0.14

regime:
  atr_threshold: 0.01      # 降低阈值到1% (原2%)
  atr_very_low: 0.004      # 降低极低阈值到0.4% (原0.8%)
  pos_mult_trending: 1.2
  pos_mult_sideways: 0.6
  pos_mult_risk_off: 0.6   # 提高Risk-Off仓位 (原0.3)

risk:
  max_single_weight: 0.25
  max_gross_exposure: 1.0
  drawdown_trigger: 0.08
  drawdown_delever: 0.50

rebalance:
  interval_minutes: 60
  deadband_sideways: 0.05
  deadband_trending: 0.03
  deadband_riskoff: 0.05

execution:
  mode: dry_run
  dry_run: true
  fee_bps: 6
  slippage_bps: 5

backtest:
  start_date: "2026-01-19"
  end_date: "2026-02-17"
  fee_bps: 6
  slippage_bps: 5
  one_bar_delay: true
  walk_forward_folds: 4
  cost_model: calibrated
  cost_stats_dir: reports/cost_stats_clean
  fee_quantile: p75
  slippage_quantile: p90
  min_fills_global: 10
  min_fills_bucket: 5
  max_stats_age_days: 30