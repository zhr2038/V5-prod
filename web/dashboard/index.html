<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="color-scheme" content="dark light" />
    <meta id="theme-color-dynamic" name="theme-color" content="#322f34" />
    <meta name="theme-color" media="(prefers-color-scheme: dark)" content="#322f34" />
    <meta name="theme-color" media="(prefers-color-scheme: light) and (hover: hover) and (pointer: fine)" content="#f3efed" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-title" content="V5 看板" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-touch-fullscreen" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <title>V5 生产交易看板</title>
    <link rel="manifest" href="/manifest.webmanifest" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
    <style>
      :root {
        --app-viewport-height: 100vh;
        --boot-bg-top: #242833;
        --boot-bg-mid: #181c24;
        --boot-bg-bottom: #12151b;
        --boot-card: rgba(255, 255, 255, 0.08);
        --boot-card-strong: rgba(255, 255, 255, 0.12);
        --boot-line: rgba(255, 255, 255, 0.18);
      }
      html, body {
        margin: 0;
        width: 100%;
        height: 100%;
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        min-height: var(--app-viewport-height);
        background:
          radial-gradient(1200px 860px at 10% 14%, rgba(194, 112, 84, 0.14), transparent 58%),
          radial-gradient(980px 760px at 86% 16%, rgba(124, 147, 185, 0.11), transparent 54%),
          radial-gradient(940px 860px at 56% 76%, rgba(124, 144, 106, 0.09), transparent 58%),
          linear-gradient(180deg, var(--boot-bg-top) 0%, var(--boot-bg-mid) 42%, var(--boot-bg-bottom) 100%);
        background-color: var(--boot-bg-bottom);
      }
      html {
        height: -webkit-fill-available;
      }
      body {
        min-height: -webkit-fill-available;
      }
      #root {
        min-height: 100vh;
        min-height: 100svh;
        min-height: 100dvh;
        min-height: var(--app-viewport-height);
      }
      #boot-shell {
        position: fixed;
        inset: 0;
        z-index: 20;
        pointer-events: none;
        padding: max(1rem, calc(env(safe-area-inset-top, 0px) + 0.5rem)) 1rem 1.25rem;
        background: inherit;
        transition: opacity .22s ease;
      }
      #boot-shell.boot-shell-hidden {
        opacity: 0;
      }
      .boot-shell-inner {
        max-width: 1780px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }
      .boot-hero {
        width: min(320px, 72vw);
        height: 42px;
        border-radius: 18px;
        background: linear-gradient(90deg, rgba(255,255,255,.14), rgba(255,255,255,.05));
      }
      .boot-grid {
        display: grid;
        grid-template-columns: repeat(5, minmax(0, 1fr));
        gap: 16px;
      }
      .boot-card,
      .boot-band,
      .boot-panel {
        border-radius: 28px;
        border: 1px solid rgba(255,255,255,.12);
        background:
          linear-gradient(180deg, rgba(255,255,255,.10), rgba(255,255,255,.02) 18%, rgba(20,24,33,.16) 100%);
        box-shadow: inset 0 1px 0 rgba(255,255,255,.08);
      }
      .boot-card {
        min-height: 118px;
      }
      .boot-band {
        min-height: 148px;
      }
      .boot-band::after {
        content: "";
        display: block;
        height: 10px;
        margin: 22px 22px 0;
        border-radius: 999px;
        background: rgba(255,255,255,.10);
      }
      .boot-layout {
        display: grid;
        grid-template-columns: minmax(0, 1.9fr) minmax(320px, 0.95fr);
        gap: 16px;
      }
      .boot-panel {
        min-height: 420px;
      }
      .boot-panel.short {
        min-height: 220px;
      }
      @media (max-width: 900px) {
        .boot-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
        .boot-layout {
          grid-template-columns: 1fr;
        }
        .boot-panel {
          min-height: 280px;
        }
      }
    </style>
  </head>
  <body>
    <div id="boot-shell" aria-hidden="true">
      <div class="boot-shell-inner">
        <div class="boot-hero"></div>
        <div class="boot-grid">
          <div class="boot-card"></div>
          <div class="boot-card"></div>
          <div class="boot-card"></div>
          <div class="boot-card"></div>
          <div class="boot-card"></div>
        </div>
        <div class="boot-band"></div>
        <div class="boot-layout">
          <div class="boot-panel"></div>
          <div class="boot-panel short"></div>
        </div>
      </div>
    </div>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
