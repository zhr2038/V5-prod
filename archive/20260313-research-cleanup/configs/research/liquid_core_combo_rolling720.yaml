task:
  name: liquid_core_combo_rolling720

paths:
  runs_dir: reports/runs
  output_report_path: reports/research/liquid_core_combo_rolling720/latest.json

experiment:
  base_config_path: configs/live_prod.yaml
  env_path: .env
  cache_dir: data/cache
  workers: auto
  symbol_pool:
    - BTC/USDT
    - ETH/USDT
    - SOL/USDT
    - BNB/USDT
    - XRP/USDT
    - ADA/USDT
  combo_sizes:
    - 4
    - 5
    - 6
  evaluations:
    - name: recent_720
      ohlcv_limit: 720
      window_shift_bars: 0
    - name: shift_360
      ohlcv_limit: 720
      window_shift_bars: 360
    - name: shift_720
      ohlcv_limit: 720
      window_shift_bars: 720
    - name: shift_1080
      ohlcv_limit: 720
      window_shift_bars: 1080
    - name: shift_1440
      ohlcv_limit: 720
      window_shift_bars: 1440
    - name: shift_1800
      ohlcv_limit: 720
      window_shift_bars: 1800
