task:
  name: liquid_universe_sweep_round2

paths:
  runs_dir: reports/runs
  output_report_path: reports/research/liquid_universe_sweep_round2/latest.json

experiment:
  base_config_path: configs/live_prod.yaml
  env_path: .env
  cache_dir: data/cache
  workers: auto
  evaluations:
    - name: screening_1200
      ohlcv_limit: 1200
      folds: 4
    - name: validation_full
      ohlcv_limit: 2759
      folds: 4
  variants:
    - name: baseline8
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - LINK/USDT
        - AVAX/USDT
    - name: baseline8_side0p5
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - LINK/USDT
        - AVAX/USDT
      overrides:
        regime.pos_mult_sideways: 0.5
    - name: baseline8_side0p45
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - LINK/USDT
        - AVAX/USDT
      overrides:
        regime.pos_mult_sideways: 0.45
    - name: baseline8_exitfast
      symbols:
        - BTC/USDT
        - ETH/USDT
        - SOL/USDT
        - BNB/USDT
        - XRP/USDT
        - ADA/USDT
        - LINK/USDT
        - AVAX/USDT
      overrides:
        execution.rank_exit_confirm_rounds: 1
        execution.min_hold_minutes_before_rank_exit: 0
        execution.open_long_cooldown_minutes: 60
