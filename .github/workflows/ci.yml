name: CI

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Upgrade pip
        run: python -m pip install --upgrade pip
      - name: Install
        run: python -m pip install -e . pytest ruff
      - name: Lint focused release paths
        run: >
          python -m ruff check
          scripts/cost_probe_live_once.py
          src/risk/negative_expectancy_cooldown.py
          tests/test_cost_probe_live_once.py
          tests/test_negative_expectancy_cooldown.py
          tests/test_prod_systemd_units.py
      - name: Test guarded cost probe, release evidence, and live gate paths
        run: >
          python -m pytest -q
          tests/test_cost_probe_live_once.py
          tests/test_prod_systemd_units.py
          tests/test_cost_probe_plan.py
          tests/test_v5_bundle_export_script.py
          tests/test_quant_lab_bundle_export.py
          tests/test_quant_lab_guard.py
          tests/test_quant_lab_guard_modes.py
          tests/test_quant_lab_permission_contract_behavior.py
          tests/test_quant_lab_live_execution_gate.py
          tests/test_negative_expectancy_cooldown.py
          tests/test_candidate_snapshot.py
